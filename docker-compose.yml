services:
  app:
    build: .
    container_name: 'medical-clinic-app'
    depends_on:
      - 'postgres-db'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/medical-db
      - SPRING_DATASOURCE_USERNAME=compose-postgres
      - SPRING_DATASOURCE_PASSWORD=compose-postgres
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    ports:
      - '8080:8080'
    networks:
      - medicalclinic-network

  postgres-db:
    image: postgres:16
    container_name: postgres
    environment:
        POSTGRES_USER: compose-postgres
        POSTGRES_PASSWORD: compose-postgres
        POSTGRES_DB: 'medical-db'
    ports:
      - '5432:5432'
    networks:
      - medicalclinic-network
    volumes:
      - medical-data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: my-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: postgres@mail.com
      PGADMIN_DEFAULT_PASSWORD: postgres
    ports:
      - "15432:80"
    networks:
      - medicalclinic-network
    volumes:
      - pgadmin-data:/var/lib/pgadmin

networks:
  medicalclinic-network:

volumes:
  medical-data:
  pgadmin-data:
